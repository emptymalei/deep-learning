data:
  dataset_name: Sleep
  data_dir: data/predictive_coding

dataloader:
  batch_size: 256
  drop_last: false
  num_workers: 0
  val_split: 0.02

encoder:
  hidden_size: 128
  norm_mode: layerNorm
  conv_layers:
    - {kernel_size: 10, stride: 5, padding: 3}
    - {kernel_size: 8,  stride: 4, padding: 2}
    - {kernel_size: 3,  stride: 1, padding: 1}

ar:
  mode: GRU
  hidden_size: 256
  n_levels: 1
  reverse: true

loss:
  n_predictions: 4
  negative_sampling_ext: 256
  temperature: 0.07

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.000001

trainer:
  epochs: 300
  output_dir: lightning_logs/sleep_cpc

runtime:
  seed: 137
  accelerator: auto
  devices: 1
