encoder:
  hidden_size: 50
  norm_mode: layerNorm
  conv_layers:
    - {kernel_size: 10, stride: 5, padding: 3}
    - {kernel_size: 8,  stride: 4, padding: 2}
    - {kernel_size: 3,  stride: 1, padding: 1}
    # - {kernel_size: 4,  stride: 2, padding: 1}

ar:
  # mode: LSTM
  # mode: transformer
  mode: GRU
  # mode: no_ar
  hidden_size: 150
  n_levels: 1
  reverse: true
  # transformer:
  #   layers: 1
  #   heads: 4
  #   dropout: 0.1
  #   max_seq_len: 256
  #   abspos: false

loss:
  n_predictions: 2
  negative_sampling_ext: 64
  temperature: 0.07

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.000001

trainer:
  epochs: 250
  output_dir: lightning_logs/synth_cpc

runtime:
  seed: 137
  accelerator: auto
  devices: 1
