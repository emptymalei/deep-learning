data:
  dataset_name: BinaryHeartbeat
  data_dir: data/predictive_coding

dataloader:
  batch_size: 16
  drop_last: false
  num_workers: 0
  val_split: 0.1

encoder:
  hidden_size: 64
  norm_mode: layerNorm
  conv_layers:
    - {kernel_size: 10, stride: 5, padding: 3}
    - {kernel_size: 8,  stride: 4, padding: 2}
    - {kernel_size: 4,  stride: 2, padding: 1}
    - {kernel_size: 4,  stride: 2, padding: 1}

ar:
  mode: GRU
  hidden_size: 200
  n_levels: 1
  reverse: true

loss:
  n_predictions: 8
  negative_sampling_ext: 128
  temperature: 0.07

optimizer:
  learning_rate: 0.0002
  weight_decay: 0.000001

trainer:
  epochs: 200
  output_dir: lightning_logs/binaryheartbeat_cpc

runtime:
  seed: 137
  accelerator: auto
  devices: 1
